name: Verify
on:
  workflow_call:
    secrets:
      VITE_FORK_URL:
        required: false
  workflow_dispatch:

permissions: {}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Check code
        run: pnpm check

      - name: Check types
        run: pnpm check:types

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      TEMPO_VERSION: v1.5.0
    permissions:
      contents: read
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0

      - name: Cache Tempo binary
        id: cache-tempo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/bin/tempo
          key: tempo-${{ env.TEMPO_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install Tempo
        if: steps.cache-tempo.outputs.cache-hit != 'true'
        run: |
          TARGET="x86_64-unknown-linux-gnu"
          ARCHIVE="tempo-${TEMPO_VERSION}-${TARGET}.tar.gz"
          URL="https://github.com/tempoxyz/tempo/releases/download/${TEMPO_VERSION}/${ARCHIVE}"
          EXPECTED_SHA="b97bf1970cdfa7b7bb017de680126686bda5a3f529c6e90cbd26973e01d2ca55"
          mkdir -p ~/.local/bin
          curl -sSL "$URL" -o "/tmp/${ARCHIVE}"
          echo "${EXPECTED_SHA}  /tmp/${ARCHIVE}" | sha256sum -c -
          tar xzf "/tmp/${ARCHIVE}" -C ~/.local/bin --strip-components=0 "tempo-${TEMPO_VERSION}-${TARGET}"
          mv ~/.local/bin/tempo-${TEMPO_VERSION}-${TARGET} ~/.local/bin/tempo
          chmod +x ~/.local/bin/tempo

      - name: Add Tempo to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4 # v4.7.0

      - name: Run tests
        run: pnpm test --bail=1
        env:
          VITE_FORK_URL: ${{ secrets.VITE_FORK_URL }}
