name: Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml
    secrets:
      VITE_FORK_URL: ${{ secrets.VITE_FORK_URL }}
